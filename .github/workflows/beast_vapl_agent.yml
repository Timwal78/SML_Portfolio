name: Beast VAPL Agent — Self-Sustaining Provenance Loop

on:
  schedule:
    # 5× weekday: market open, mid-morning, noon, mid-afternoon, close (ET = UTC-4/5)
    - cron: '45 12 * * 1-5'   # 08:45 ET
    - cron: '35 13 * * 1-5'   # 09:35 ET
    - cron: '0  17 * * 1-5'   # 13:00 ET
    - cron: '0  19 * * 1-5'   # 15:00 ET
    - cron: '15 20 * * 1-5'   # 16:15 ET
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Override symbol (default: IWM)'
        required: false
        default: 'IWM'
      dry_run:
        description: 'Dry run — fetch and issue VCs, skip registry submission'
        required: false
        default: 'false'

jobs:
  beast-vapl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install --quiet requests cryptography xrpl-py anthropic

      - name: Run Beast VAPL loop
        env:
          SQUEEZEOS_BASE_URL: https://squeezeos-api.onrender.com
          VAPL_REGISTRY_URL: https://vapl-registry.onrender.com
          AGENT_XRPL_SEED: ${{ secrets.AGENT_XRPL_SEED }}
          AGENT_XRPL_ADDRESS: ${{ secrets.AGENT_XRPL_ADDRESS }}
          PROOF402_SERVER_URL: https://four02proof.onrender.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAPL_SOUL_B64: ${{ secrets.VAPL_SOUL_B64 }}
          SYMBOL: ${{ github.event.inputs.symbol || 'IWM' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python vapl/beast_agent/run.py
