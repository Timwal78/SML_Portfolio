name: deploy-xmit-worker

# Deploys xMIT Cloudflare Worker — no local CLI needed.
# Set these GitHub secrets once, then click Run workflow:
#   CLOUDFLARE_API_TOKEN   (Cloudflare dashboard → My Profile → API Tokens → Create Token → Workers Edit)
#   CLOUDFLARE_ACCOUNT_ID  (Cloudflare dashboard → right sidebar)
#   X402_RESOURCE_PRIVATE_KEY  (Base wallet private key for signing x402 resource headers)
#   XMIT_CONTRACT_ADDRESS  (optional — leave unset until contracts are deployed)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["xmit/worker/**"]

jobs:
  deploy:
    name: Deploy xMIT to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xmit/worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@cdca7d6dd16c72fb5d9c5b2d47aaddfca8fd94e2 # v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Get or create D1 database
        run: |
          DB_ID=$(npx wrangler d1 list --json 2>/dev/null | jq -r '.[] | select(.name=="xmit-db") | .uuid // .id // empty' | head -1)

          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database xmit-db..."
            CREATE_OUT=$(npx wrangler d1 create xmit-db 2>&1)
            echo "$CREATE_OUT"
            DB_ID=$(echo "$CREATE_OUT" | grep -oP 'database_id = "\K[^"]+' | head -1)
          fi

          if [ -z "$DB_ID" ]; then
            echo "ERROR: could not determine D1 database ID. Check logs above."
            exit 1
          fi

          echo "Using D1 database ID: $DB_ID"
          sed -i "s/YOUR_D1_DATABASE_ID/$DB_ID/" wrangler.toml
          echo "DB_ID=$DB_ID" >> $GITHUB_ENV

      - name: Create R2 bucket
        run: npx wrangler r2 bucket create xmit-storage 2>&1 || echo "Bucket already exists — continuing"

      - name: Set worker secrets
        run: |
          echo "${{ secrets.X402_RESOURCE_PRIVATE_KEY }}" | npx wrangler secret put X402_RESOURCE_PRIVATE_KEY
          CONTRACT="${{ secrets.XMIT_CONTRACT_ADDRESS }}"
          echo "${CONTRACT:-0x0000000000000000000000000000000000000000}" | npx wrangler secret put XMIT_CONTRACT_ADDRESS

      - name: Deploy worker
        run: npx wrangler deploy

      - name: Apply D1 schema
        run: npx wrangler d1 execute xmit-db --remote --file=schema.sql
        continue-on-error: true

      - name: Done
        run: |
          echo ""
          echo "xMIT worker deployed."
          echo "Free endpoints live at your workers.dev subdomain."
          echo "Set XMIT_CONTRACT_ADDRESS secret after deploying Base contracts."
