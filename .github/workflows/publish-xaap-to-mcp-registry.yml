name: Publish xAAP to MCP Registry

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths: ["xaap/server.json"]

jobs:
  publish:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher --help | head -1

      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish xaap/server.json
        run: |
          cd xaap
          ../mcp-publisher publish

      - name: Verify listing
        run: |
          echo "Published. Verifying in registry..."
          sleep 5
          curl -s "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.Timwal78/xaap" | head -c 800 || true
          echo ""
