:concurrency: 5
:queues:
  - [critical, 3]
  - [default, 2]
  - [mailer, 2]
  - [low, 1]
:schedule:
  mark_away_agents:
    cron: '* * * * *'
    class: MarkAwayAgentsJob
  weekly_digest:
    cron: '0 9 * * 1'
    class: WeeklyDigestJob
    description: "Send weekly top-agents digest every Monday at 9am UTC"
  merkle_anchor:
    cron: '0 0 * * *'
    class: MerkleAnchorJob
    description: "Daily reputation Merkle root anchor"
