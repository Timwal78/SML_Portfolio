# Active Storage service configurations.
#
# In production, the :amazon service is activated via config/environments/production.rb.
# In development and test, the :local / :test_disk services are used.
#
# Credentials are sourced from environment variables; never hardcoded here.
# See .env.example for all required AWS variables.

# ---------------------------------------------------------------------------
# Local disk — development default
# ---------------------------------------------------------------------------
local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# ---------------------------------------------------------------------------
# Local disk — test suite (isolated tmp directory; wiped between test runs)
# ---------------------------------------------------------------------------
test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

# ---------------------------------------------------------------------------
# Amazon S3 — production primary storage
# ---------------------------------------------------------------------------
# Required environment variables:
#   AWS_ACCESS_KEY_ID       — IAM user access key
#   AWS_SECRET_ACCESS_KEY   — IAM user secret
#   AWS_REGION              — e.g. us-east-1
#   AWS_S3_BUCKET           — e.g. agentcard-production
#
# Recommended IAM policy (least privilege):
#   s3:GetObject, s3:PutObject, s3:DeleteObject on arn:aws:s3:::agentcard-*/*
#   s3:ListBucket on arn:aws:s3:::agentcard-*
#
# Enable versioning and server-side encryption (SSE-S3 or SSE-KMS) on the bucket.
amazon:
  service: S3
  access_key_id:     <%= ENV.fetch("AWS_ACCESS_KEY_ID",     "") %>
  secret_access_key: <%= ENV.fetch("AWS_SECRET_ACCESS_KEY", "") %>
  region:            <%= ENV.fetch("AWS_REGION",            "us-east-1") %>
  bucket:            <%= ENV.fetch("AWS_S3_BUCKET",         "agentcard-production") %>
  # Upload options applied to every object
  upload:
    server_side_encryption: "AES256"     # SSE-S3 (free); upgrade to aws:kms if required
    acl:                    "private"    # Never public — serve through signed URLs only
  # Force path-style URLs for custom S3-compatible endpoints (MinIO etc.)
  # force_path_style: true

# ---------------------------------------------------------------------------
# Amazon S3 — staging bucket (optional; set AWS_S3_STAGING_BUCKET to activate)
# ---------------------------------------------------------------------------
amazon_staging:
  service: S3
  access_key_id:     <%= ENV.fetch("AWS_ACCESS_KEY_ID",            "") %>
  secret_access_key: <%= ENV.fetch("AWS_SECRET_ACCESS_KEY",        "") %>
  region:            <%= ENV.fetch("AWS_REGION",                   "us-east-1") %>
  bucket:            <%= ENV.fetch("AWS_S3_STAGING_BUCKET",        "agentcard-staging") %>
  upload:
    server_side_encryption: "AES256"
    acl:                    "private"

# ---------------------------------------------------------------------------
# Mirror service — write to both S3 and a backup bucket simultaneously.
# Activate by setting config.active_storage.service = :mirror in the env file.
# ---------------------------------------------------------------------------
# mirror:
#   service: Mirror
#   primary: amazon
#   mirrors:
#     - amazon_staging
